name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Skeleton check (no backend yet)
        run: |
          if [ -f backend/requirements.txt ]; then
            pip install -r backend/requirements.txt
            pip install ruff mypy pytest
            ruff check backend/
            pytest backend/ -q || true
          else
            echo "Backend not yet scaffolded — skipping (W1-03 で作成予定)"
          fi

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Skeleton check (no frontend yet)
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend
            npm ci
            npm run typecheck
            npm run build
          else
            echo "Frontend not yet scaffolded — skipping (W1-07 で作成予定)"
          fi
