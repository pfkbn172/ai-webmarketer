# /marketer/ パスベース配置(implementation_plan.md 7 章 / 12 章)
#
# 使い方:
#   sudo cp deploy/nginx/marketer.conf /etc/nginx/sites-available/marketer.conf
#   /etc/nginx/sites-enabled/app の HTTPS server { ... } 内末尾に
#       include /etc/nginx/sites-available/marketer.conf;
#   を 1 行追加。
#   sudo nginx -t && sudo systemctl reload nginx
#
# 既存 location との衝突: /marketer プレフィックスは未使用、衝突なし。

# API: FastAPI が /api/v1/* で待ち受け、Nginx で /marketer/api/ を /api/ に書き換える
location /marketer/api/ {
    proxy_pass http://127.0.0.1:3009/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
}

# Webhook: WordPress / 問い合わせフォーム等からの POST 受信用
location /marketer/webhook/ {
    proxy_pass http://127.0.0.1:3009/webhook/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 5m;
}

# SPA fallback: 専用 location で alias を使い、index.html を確実に返す
# /marketer/ ロケーションの try_files フォールバック先として named location 経由で呼ぶ
location = /marketer/index.html {
    alias /var/www/ai-web-marketer/frontend/dist/index.html;
    add_header Cache-Control "no-cache";
}

# SPA 配信: Vite ビルド成果物を静的配信
# alias + try_files で $uri/ に対しては index ディレクティブで index.html を引く必要がある。
# fallback の /marketer/index.html は上の named location 相当の location = で確実に解決させる。
location /marketer/ {
    alias /var/www/ai-web-marketer/frontend/dist/;
    index index.html;
    try_files $uri $uri/ /marketer/index.html;
    add_header Cache-Control "public, max-age=3600";
}

# 末尾スラッシュなしアクセスは / 付きへリダイレクト
location = /marketer {
    return 301 /marketer/;
}
